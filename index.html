<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="OVERLOAD"/>
<title>OVERLOAD</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#0a0a0a;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
#app{max-width:480px;margin:0 auto;padding:20px 16px 80px}

/* ── Type ── */
.app-name{
  font-size:24px;font-weight:900;letter-spacing:0.15em;font-family:monospace;
  background:linear-gradient(120deg,#FF6B35,#4ECDC4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.app-sub{color:#2a2a2a;font-size:10px;letter-spacing:0.08em;margin-top:2px;font-family:monospace}
.screen-title{font-size:20px;font-weight:800;margin:0}

/* ── Layout ── */
.row{display:flex;align-items:center}
.between{justify-content:space-between}
.gap8{gap:8px}

/* ── Stats ── */
.stats-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:12px 14px}
.stat-num{font-size:26px;font-weight:800;font-family:monospace}
.stat-lbl{color:#333;font-size:11px;margin-top:1px}

/* ── Tabs ── */
.tab-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.tab{
  padding:7px 16px;border-radius:20px;border:1px solid #1e1e1e;
  background:transparent;color:#555;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;min-height:38px;
  -webkit-tap-highlight-color:transparent;
}

/* ── Exercise list ── */
.ex-list{display:flex;flex-direction:column;gap:8px}
.ex-card{
  display:flex;align-items:center;gap:10px;
  background:#111;border:1px solid #1a1a1a;border-radius:12px;
  padding:14px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.ex-card:active{background:#161616}
.ex-name{font-weight:700;font-size:15px;color:#fff;margin-bottom:3px}
.ex-meta{color:#3a3a3a;font-size:12px;line-height:1.4}
.ex-arrow{font-size:22px;opacity:0.3;flex-shrink:0}
.ex-rec{text-align:right;margin-right:4px;flex-shrink:0}
.ex-rec-num{font-weight:800;font-size:18px;font-family:monospace}
.ex-rec-lbl{color:#333;font-size:10px}

/* ── Badge ── */
.badge{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:0.1em;
  font-family:monospace;margin-bottom:5px;
}

/* ── Buttons ── */
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
button *{pointer-events:none}

.btn-back{
  background:#141414;border:1px solid #1e1e1e;border-radius:8px;
  color:#666;width:38px;height:38px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;margin-top:3px;
}
.btn-sm{
  display:flex;align-items:center;gap:5px;background:#111;
  border:1px solid #1e1e1e;border-radius:8px;color:#555;
  padding:8px 12px;font-size:12px;min-height:38px;
}
.btn-primary{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,#4ECDC4,#26a69a);
  border:none;border-radius:14px;color:#000;
  padding:16px;font-size:16px;font-weight:800;width:100%;min-height:52px;
}
.btn-ghost{
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:transparent;border:1px dashed #1e1e1e;border-radius:12px;
  color:#333;padding:14px;font-size:13px;width:100%;min-height:48px;
}
.btn-add-set{
  display:flex;align-items:center;justify-content:center;gap:5px;
  width:100%;background:transparent;border:none;
  color:#2e2e2e;padding:12px 0;font-size:13px;min-height:44px;
}
.btn-trash{
  background:transparent;border:none;color:#444;
  display:flex;align-items:center;justify-content:center;
  min-width:36px;min-height:44px;flex-shrink:0;
}
.btn-trash:active{color:#FF6B6B}
.btn-link{
  background:transparent;border:none;color:#333;
  font-size:12px;text-decoration:underline;
  display:block;text-align:center;width:100%;
  padding:12px;margin-top:8px;
}

/* ── Card ── */
.card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:12px}
.card-lbl{color:#444;font-size:10px;letter-spacing:0.08em;margin-bottom:12px;font-family:monospace;text-transform:uppercase;font-weight:600}

/* ── Rec banner ── */
.rec-banner{
  background:#111;border:1px solid;border-radius:14px;
  padding:14px 16px;margin-bottom:12px;
}
.rec-top-lbl{color:#444;font-size:11px;margin-bottom:4px}
.rec-number{font-size:40px;font-weight:900;color:#fff;line-height:1;font-family:monospace}
.rec-unit{font-size:17px;color:#444;font-weight:400}
.rec-sub{color:#444;font-size:12px;margin-top:4px}
.status-pill{padding:6px 12px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}

/* ── Set grid ── */
.grid-hdr{
  display:flex;align-items:center;gap:8px;
  padding-bottom:8px;margin-bottom:2px;
  border-bottom:1px solid #1a1a1a;
}
.col-lbl{flex:1;color:#2e2e2e;font-size:10px;letter-spacing:0.06em;text-align:center;font-family:monospace}
.set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #151515}
.set-row:last-of-type{border-bottom:none}
.set-num{
  width:28px;text-align:center;font-size:11px;
  font-family:monospace;color:#2e2e2e;flex-shrink:0;
}
.cell{
  flex:1;background:#161616;border:1px solid #1e1e1e;
  border-radius:8px;color:#fff;padding:11px 4px;
  font-size:17px;outline:none;text-align:center;
  font-family:monospace;font-weight:700;min-width:0;
  -webkit-appearance:none;width:100%;
}
.cell:focus{border-color:#383838;background:#1a1a1a}

/* ── Projection ── */
.proj-card{
  background:#0d0d0d;border:1px solid #1a1a1a;
  border-radius:14px;padding:14px 16px;margin-bottom:12px;
}
.proj-lbl{color:#252525;font-size:10px;letter-spacing:0.1em;font-family:monospace;margin-bottom:8px}
.proj-num{font-size:30px;font-weight:900;font-family:monospace;line-height:1}
.proj-note{color:#3a3a3a;font-size:12px;margin-top:4px}

/* ── History ── */
.date-hdr{color:#333;font-size:11px;font-family:monospace;letter-spacing:0.08em;margin-bottom:8px;text-transform:uppercase}
.hist-card{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:14px;margin-bottom:8px}
.mini-set{background:#141414;border:1px solid;border-radius:6px;padding:3px 8px;font-size:11px;font-family:monospace}
.mini-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* ── Custom input ── */
.custom-card{display:flex;gap:8px;background:#111;border:1px solid #222;border-radius:12px;padding:12px;align-items:center}
.custom-in{flex:1;background:transparent;border:none;color:#fff;font-size:15px;outline:none;font-family:inherit;min-height:36px;padding:0}
.btn-cadd{background:#4ECDC4;border:none;border-radius:6px;color:#000;padding:8px 14px;font-weight:800;font-size:13px}

/* ── Toast ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  color:#000;font-weight:700;padding:11px 24px;border-radius:100px;
  font-size:13px;z-index:9999;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  pointer-events:none;transition:opacity 0.3s;
}
.empty{text-align:center;color:#2a2a2a;padding:60px 0;font-size:14px}
.spacer{height:48px}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ── Storage ───────────────────────────────────────────────────────────────────
const SKEY = 'overload-v4';
function load() {
  try { const r = localStorage.getItem(SKEY); return r ? JSON.parse(r) : {exercises:{}, sessions:[]}; }
  catch { return {exercises:{}, sessions:[]}; }
}
function save(d) { try { localStorage.setItem(SKEY, JSON.stringify(d)); } catch(e) {} }

// ── Progressive overload ──────────────────────────────────────────────────────
function getRec(history) {
  if (!history || !history.length) return null;
  const last = history[0];
  const { sets } = last;
  if (!sets || !sets.length) return null;

  const tgt     = sets[0].targetReps || 8;
  const missed  = sets.filter(s => s.reps < tgt).length;
  const allHit  = missed === 0;
  const oneMiss = missed === 1;
  const manyMiss= missed >= Math.ceil(sets.length / 2);
  const lw      = sets[0].weight;
  const isUpper = last.muscleGroup === 'push' || last.muscleGroup === 'pull';
  const inc     = isUpper ? 5 : 10;

  let nw, note, status;
  if (allHit)              { nw = lw + inc; note = `All ${sets.length} sets done — move up!`; status = 'up'; }
  else if (oneMiss && !manyMiss) { nw = lw; note = 'Almost — hold and nail all sets next time.'; status = 'hold'; }
  else if (manyMiss)       { nw = Math.round((lw * 0.9) / 2.5) * 2.5; note = 'Struggled — slight deload.'; status = 'down'; }
  else                     { nw = lw; note = 'Hold weight, focus on form.'; status = 'hold'; }

  return { nextWeight: nw, note, lastWeight: lw, lastSets: sets, status };
}

// ── Constants ─────────────────────────────────────────────────────────────────
const DEF = {
  push:     ['Bench Press','Overhead Press','Incline DB Press','Lateral Raises','Tricep Pushdown'],
  pull:     ['Deadlift','Barbell Row','Pull-Ups','Cable Row','Face Pulls','Bicep Curl'],
  legs:     ['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raise'],
  freeform: []
};
const GC = {
  push:     {bg:'#FF6B35', lt:'#FF6B3515', tx:'#FF6B35'},
  pull:     {bg:'#4ECDC4', lt:'#4ECDC415', tx:'#4ECDC4'},
  legs:     {bg:'#A78BFA', lt:'#A78BFA15', tx:'#A78BFA'},
  freeform: {bg:'#F59E0B', lt:'#F59E0B15', tx:'#F59E0B'}
};
const SM = {
  up:   {color:'#4ECDC4', icon:'↑', label:'Increase'},
  hold: {color:'#F59E0B', icon:'→', label:'Hold'},
  down: {color:'#FF6B6B', icon:'↓', label:'Deload'}
};

// ── SVG icons (pointer-events none baked in) ──────────────────────────────────
const I = {
  back:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" pointer-events="none"><polyline points="15 18 9 12 15 6"/></svg>`,
  plus:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" pointer-events="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  trash: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" pointer-events="none"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>`,
  check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" pointer-events="none"><polyline points="20 6 9 17 4 12"/></svg>`,
  clock: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" pointer-events="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
};

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  data:      load(),
  view:      'home',   // home | log | history
  group:     'push',
  exercise:  null,     // {name, group}
  numSets:   3,
  showCustom: false,
};

function persist(d) { S.data = d; save(d); }

function getHistory(name) {
  return (S.data.sessions || [])
    .filter(s => s.exercise === name)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getExercises(group) {
  const defaults = DEF[group] || [];
  const custom   = Object.values(S.data.exercises || {}).filter(e => e.group === group).map(e => e.name);
  return [...defaults, ...custom];
}

function showToast(msg, color = '#4ECDC4') {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.style.background = color; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

// ── Set row DOM helpers (never re-render on input) ────────────────────────────
function readSets() {
  return Array.from(document.querySelectorAll('#set-rows .set-row')).map(row => ({
    w: row.querySelector('.inp-w')?.value || '',
    r: row.querySelector('.inp-r')?.value || '',
    t: row.querySelector('.inp-t')?.value || '8'
  }));
}

function refreshRow(row) {
  const w = row.querySelector('.inp-w')?.value || '';
  const r = row.querySelector('.inp-r')?.value || '';
  const t = row.querySelector('.inp-t')?.value || '8';
  const num  = row.querySelector('.set-num');
  const inpR = row.querySelector('.inp-r');
  const filled = w !== '' && r !== '';
  const hit    = filled && parseInt(r) >= parseInt(t || 8);

  if (filled) {
    num.textContent = hit ? '✓' : '✗';
    num.style.color = hit ? '#4ECDC4' : '#FF6B6B';
    num.style.fontSize = '15px';
    inpR.style.borderColor = hit ? '#4ECDC450' : '#FF6B6B50';
    inpR.style.color = hit ? '#4ECDC4' : '#FF6B6B';
    row.style.background = hit ? '#4ECDC406' : '#FF6B6B06';
  } else {
    num.textContent = `S${+row.dataset.idx + 1}`;
    num.style.color = '#2e2e2e';
    num.style.fontSize = '11px';
    inpR.style.borderColor = '#1e1e1e';
    inpR.style.color = '#fff';
    row.style.background = 'transparent';
  }
}

function refreshProjection() {
  const proj = document.getElementById('proj-card');
  if (!proj) return;
  const filled = readSets().filter(s => s.w !== '' && s.r !== '');
  if (!filled.length) { proj.style.display = 'none'; return; }

  const fakeSets = filled.map(s => ({
    weight: parseFloat(s.w) || 0,
    reps: parseInt(s.r) || 0,
    targetReps: parseInt(s.t) || 8
  }));
  const live = getRec([{ sets: fakeSets, muscleGroup: S.exercise?.group }]);
  if (!live) { proj.style.display = 'none'; return; }

  proj.style.display = 'block';
  proj.style.borderColor = SM[live.status].color + '35';
  const pw = proj.querySelector('.proj-num');
  pw.innerHTML = `${live.nextWeight}<span style="font-size:16px;color:#444;font-weight:400"> lbs</span>`;
  pw.style.color = SM[live.status].color;
  proj.querySelector('.proj-note').textContent = live.note;
  proj.querySelector('.proj-emoji').textContent = live.status === 'up' ? '🔥' : live.status === 'hold' ? '💪' : '🔄';
}

function makeSetRow(idx, sugW, sugT) {
  const div = document.createElement('div');
  div.className = 'set-row';
  div.dataset.idx = String(idx);
  div.innerHTML = `
    <div class="set-num" style="color:#2e2e2e;font-size:11px">S${idx + 1}</div>
    <input class="cell inp-w" type="number" inputmode="decimal" placeholder="${sugW || 'lbs'}" value="${sugW}" autocomplete="off" autocorrect="off"/>
    <input class="cell inp-r" type="number" inputmode="numeric" placeholder="—" autocomplete="off" autocorrect="off"/>
    <input class="cell inp-t" type="number" inputmode="numeric" placeholder="8" value="${sugT || '8'}" autocomplete="off" autocorrect="off"/>
    <button class="btn-trash" data-action="del-set" data-idx="${idx}">${I.trash}</button>`;

  // Input listeners — only update DOM, never re-render
  div.querySelectorAll('.inp-w, .inp-r, .inp-t').forEach(inp => {
    inp.addEventListener('input', () => { refreshRow(div); refreshProjection(); });
  });

  // Mirror weight from set 1 → sets 2 & 3 if still blank/mirrored
  div.querySelector('.inp-w').addEventListener('input', e => {
    if (idx === 0) {
      document.querySelectorAll('#set-rows .inp-w').forEach((o, i) => {
        if (i > 0 && (o.value === '' || o.dataset.mirrored === '1')) {
          o.value = e.target.value;
          o.dataset.mirrored = '1';
          refreshRow(o.closest('.set-row'));
        }
      });
    } else {
      e.target.dataset.mirrored = '0';
    }
  });

  return div;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (S.view === 'log')     app.innerHTML = renderLog();
  else if (S.view === 'history') app.innerHTML = renderHistory();
  else                           app.innerHTML = renderHome();
  bindEvents();
  if (S.view === 'log') initLog();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const col     = GC[S.group];
  const exs     = getExercises(S.group);
  const total   = (S.data.sessions || []).length;
  const week    = (S.data.sessions || []).filter(s => (new Date() - new Date(s.date)) / 86400000 <= 7).length;

  const tabs = ['push','pull','legs','freeform'].map(g => {
    const c = GC[g], active = S.group === g;
    const style = active ? `background:${c.bg};color:#000;border-color:${c.bg};font-weight:800` : '';
    return `<button class="tab" data-tab="${g}" style="${style}">${g[0].toUpperCase() + g.slice(1)}</button>`;
  }).join('');

  const cards = exs.map(name => {
    const hist = getHistory(name);
    const last = hist[0] || null;
    const rec  = getRec(hist);

    const metaStr = last
      ? `Last: ${last.sets[0]?.weight} lbs &nbsp;·&nbsp; ${last.sets.map(s => s.reps).join(' / ')} reps &nbsp;<span style="color:#2e2e2e">${new Date(last.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`
      : `<span style="color:#252525">No history yet</span>`;

    const recHtml = rec
      ? `<div class="ex-rec">
           <div class="ex-rec-num" style="color:${col.tx}">${rec.nextWeight}</div>
           <div class="ex-rec-lbl">lbs next</div>
         </div>`
      : '';

    return `<div class="ex-card" data-action="open-log" data-name="${esc(name)}">
      <div style="flex:1;min-width:0;pointer-events:none">
        <div class="ex-name">${esc(name)}</div>
        <div class="ex-meta">${metaStr}</div>
      </div>
      ${recHtml}
      <div class="ex-arrow" style="color:${col.tx};pointer-events:none">›</div>
    </div>`;
  }).join('');

  const customHtml = S.showCustom
    ? `<div class="custom-card">
         <input class="custom-in" id="cin" placeholder="Exercise name..." autocomplete="off" autocorrect="off"/>
         <button class="btn-cadd" data-action="add-custom">Add</button>
         <button style="background:transparent;border:none;color:#444;font-size:20px;padding:0 4px;cursor:pointer;min-height:36px" data-action="hide-custom">✕</button>
       </div>`
    : `<button class="btn-ghost" data-action="show-custom">${I.plus} Add Exercise</button>`;

  return `
    <div class="row between" style="margin-bottom:20px;align-items:flex-start">
      <div>
        <div class="app-name">OVERLOAD</div>
        <div class="app-sub">Progressive Strength Tracker</div>
      </div>
      <button class="btn-sm" data-action="go-history">${I.clock} History</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" style="color:#4ECDC4">${total}</div>
        <div class="stat-lbl">Total Sessions</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#FF6B35">${week}</div>
        <div class="stat-lbl">This Week</div>
      </div>
    </div>

    <div class="tab-row">${tabs}</div>
    <div class="ex-list">${cards}${customHtml}</div>`;
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function renderLog() {
  const col  = GC[S.exercise.group] || GC.freeform;
  const hist = getHistory(S.exercise.name);
  const rec  = getRec(hist);

  const recHtml = rec ? `
    <div class="rec-banner" style="border-color:${col.bg}50">
      <div class="row between" style="align-items:flex-start">
        <div>
          <div class="rec-top-lbl">🎯 Recommended for today</div>
          <div class="rec-number">${rec.nextWeight}<span class="rec-unit"> lbs</span></div>
          <div class="rec-sub">Last: ${rec.lastWeight} lbs &nbsp;·&nbsp; ${rec.lastSets.map(s => s.reps).join(' / ')} reps</div>
        </div>
        <div class="status-pill" style="background:${SM[rec.status].color}18;color:${SM[rec.status].color}">
          ${SM[rec.status].icon} ${SM[rec.status].label}
        </div>
      </div>
    </div>` : '';

  return `
    <div class="row gap8" style="margin-bottom:18px;align-items:flex-start">
      <button class="btn-back" data-action="go-home">${I.back}</button>
      <div>
        <span class="badge" style="background:${col.lt};color:${col.tx}">${S.exercise.group.toUpperCase()}</span>
        <h2 class="screen-title">${esc(S.exercise.name)}</h2>
      </div>
    </div>

    ${recHtml}

    <div class="card">
      <div class="grid-hdr">
        <div style="width:28px"></div>
        <div class="col-lbl">Weight (lbs)</div>
        <div class="col-lbl">Reps Done</div>
        <div class="col-lbl">Target</div>
        <div style="width:36px"></div>
      </div>
      <div id="set-rows"></div>
      <button class="btn-add-set" data-action="add-set">${I.plus} Add Set</button>
    </div>

    <div class="proj-card" id="proj-card" style="display:none">
      <div class="proj-lbl">NEXT SESSION PROJECTION</div>
      <div class="row between">
        <div>
          <div class="proj-num"></div>
          <div class="proj-note"></div>
        </div>
        <div class="proj-emoji" style="font-size:26px"></div>
      </div>
    </div>

    <button class="btn-primary" data-action="save-session">${I.check} Save Session</button>
    <button class="btn-link" data-action="clear-data">Clear all data</button>
    <div class="spacer"></div>`;
}

function initLog() {
  const hist = getHistory(S.exercise.name);
  const rec  = getRec(hist);
  const sugW = rec ? String(rec.nextWeight) : '';
  const sugT = String(hist[0]?.sets[0]?.targetReps || 8);
  const container = document.getElementById('set-rows');
  for (let i = 0; i < S.numSets; i++) container.appendChild(makeSetRow(i, sugW, sugT));
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const sorted  = [...(S.data.sessions || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
  const grouped = {};
  sorted.forEach(s => {
    const d = new Date(s.date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(s);
  });

  const body = !Object.keys(grouped).length
    ? `<div class="empty">No sessions yet — start logging!</div>`
    : Object.entries(grouped).map(([date, sessions]) => `
        <div style="margin-bottom:22px">
          <div class="date-hdr">${date}</div>
          ${sessions.map(s => {
            const col    = GC[s.muscleGroup] || GC.freeform;
            const top    = [...s.sets].sort((a, b) => b.weight - a.weight)[0];
            const allHit = s.sets.every(st => st.reps >= (st.targetReps || 0));
            const mini   = s.sets.map(st => {
              const hit = st.reps >= (st.targetReps || 0);
              return `<div class="mini-set" style="border-color:${hit ? col.bg + '70' : '#222'};color:${hit ? col.tx : '#444'}">${st.weight}×${st.reps}</div>`;
            }).join('');
            return `<div class="hist-card">
              <div class="row between" style="align-items:flex-start">
                <div style="flex:1">
                  <div class="row gap8" style="margin-bottom:5px">
                    <span class="badge" style="background:${col.lt};color:${col.tx};margin:0">${(s.muscleGroup || '').toUpperCase()}</span>
                    ${allHit ? '<span style="font-size:11px;color:#4ECDC4">✓ All sets</span>' : ''}
                  </div>
                  <div style="font-weight:700;font-size:15px">${esc(s.exercise)}</div>
                  <div style="color:#444;font-size:12px;margin-top:3px">
                    ${s.sets.length} sets &nbsp;·&nbsp; Top: ${top?.weight} lbs × ${top?.reps} reps
                  </div>
                </div>
                <button class="btn-trash" data-action="del-session" data-id="${s.id}">${I.trash}</button>
              </div>
              <div class="mini-row">${mini}</div>
            </div>`;
          }).join('')}
        </div>`
    ).join('');

  return `
    <div class="row gap8" style="margin-bottom:18px">
      <button class="btn-back" data-action="go-home">${I.back}</button>
      <h2 class="screen-title">History</h2>
    </div>
    ${body}
    <div class="spacer"></div>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function bindEvents() {
  const app = document.getElementById('app');

  // Tab switches
  app.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => { S.group = btn.dataset.tab; S.showCustom = false; render(); });
  });

  // Custom exercise input
  const cin = document.getElementById('cin');
  if (cin) {
    cin.focus();
    cin.addEventListener('keydown', e => { if (e.key === 'Enter') doAddCustom(); });
  }

  // Click delegation — walk up from tapped element
  app.addEventListener('click', e => {
    let el = e.target;
    while (el && el !== app) {
      if (el.dataset && el.dataset.action) break;
      el = el.parentElement;
    }
    if (!el || !el.dataset || !el.dataset.action) return;

    switch (el.dataset.action) {
      case 'go-home':
        S.view = 'home'; render(); break;
      case 'go-history':
        S.view = 'history'; render(); break;
      case 'open-log': {
        const name = el.dataset.name;
        if (name) { S.exercise = {name, group: S.group}; S.numSets = 3; S.view = 'log'; render(); }
        break;
      }
      case 'show-custom': S.showCustom = true; render(); break;
      case 'hide-custom': S.showCustom = false; render(); break;
      case 'add-custom':  doAddCustom(); break;
      case 'add-set':     doAddSet(); break;
      case 'del-set':     doDelSet(+el.dataset.idx); break;
      case 'save-session': doSave(); break;
      case 'del-session':  doDelSession(+el.dataset.id); break;
      case 'clear-data':   doClearData(); break;
    }
  });
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doAddCustom() {
  const cin  = document.getElementById('cin');
  const name = (cin?.value || '').trim();
  if (!name) return;
  const key = `c${Date.now()}`;
  persist({ ...S.data, exercises: { ...(S.data.exercises || {}), [key]: {name, group: S.group, key} } });
  S.showCustom = false;
  showToast(`Added "${name}"!`);
  render();
}

function doAddSet() {
  const container = document.getElementById('set-rows');
  if (!container) return;
  const idx  = container.querySelectorAll('.set-row').length;
  const sugW = document.querySelector('#set-rows .inp-w')?.value || '';
  const sugT = document.querySelector('#set-rows .inp-t')?.value || '8';
  container.appendChild(makeSetRow(idx, sugW, sugT));
  S.numSets = idx + 1;
}

function doDelSet(idx) {
  const rows = document.querySelectorAll('#set-rows .set-row');
  if (rows.length <= 1) return;
  document.querySelector(`#set-rows .set-row[data-idx="${idx}"]`)?.remove();
  // Re-number
  document.querySelectorAll('#set-rows .set-row').forEach((r, i) => {
    r.dataset.idx = i;
    const num = r.querySelector('.set-num');
    if (r.querySelector('.inp-r')?.value === '') {
      num.textContent = `S${i + 1}`;
      num.style.color = '#2e2e2e';
      num.style.fontSize = '11px';
    }
    r.querySelector('[data-action="del-set"]').dataset.idx = i;
  });
  S.numSets--;
  refreshProjection();
}

function doSave() {
  const filled = readSets().filter(s => s.w !== '' && s.r !== '');
  if (!filled.length) { showToast('Enter at least one set first.', '#FF6B6B'); return; }
  const finalSets = filled.map(s => ({
    weight: parseFloat(s.w),
    reps: parseInt(s.r),
    targetReps: parseInt(s.t) || 8
  }));
  const session = {
    id: Date.now(),
    exercise: S.exercise.name,
    muscleGroup: S.exercise.group,
    date: new Date().toISOString(),
    sets: finalSets
  };
  persist({ ...S.data, sessions: [...(S.data.sessions || []), session] });
  showToast(`✓ ${S.exercise.name} saved!`);
  S.view = 'home';
  render();
}

function doDelSession(id) {
  persist({ ...S.data, sessions: (S.data.sessions || []).filter(s => s.id !== id) });
  render();
}

function doClearData() {
  if (confirm('Clear ALL workout data? This cannot be undone.')) {
    persist({ exercises: {}, sessions: [] });
    S.view = 'home';
    render();
    showToast('Data cleared.', '#FF6B6B');
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
