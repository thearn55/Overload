<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="OVERLOAD"/>
<title>OVERLOAD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1a1a1a;
    --push: #FF6B35;
    --pull: #4ECDC4;
    --legs: #A78BFA;
    --free: #F59E0B;
    --up:   #4ECDC4;
    --hold: #F59E0B;
    --down: #FF6B6B;
  }

  html, body {
    background: var(--bg);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 80px;
    min-height: 100vh;
  }

  /* ── Typography ── */
  .app-name {
    font-size: 25px; font-weight: 900; letter-spacing: 0.18em;
    font-family: monospace;
    background: linear-gradient(120deg, #FF6B35, #4ECDC4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .app-sub { color: #2e2e2e; font-size: 10px; letter-spacing: 0.1em; margin-top: 2px; font-family: monospace; }
  .screen-title { font-size: 21px; font-weight: 800; margin: 0; }
  .card-label { color: #484848; font-size: 11px; letter-spacing: 0.07em; margin-bottom: 12px; font-family: monospace; text-transform: uppercase; font-weight: 600; }

  /* ── Layout ── */
  .home-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .stat-num { font-size: 26px; font-weight: 800; color: var(--pull); font-family: monospace; }
  .stat-label { color: #3a3a3a; font-size: 11px; margin-top: 1px; }
  .tab-row { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
  .exercise-list { display: flex; flex-direction: column; gap: 8px; }

  /* ── Buttons ── */
  button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-back {
    background: #141414; border: 1px solid #1e1e1e; border-radius: 8px;
    color: #666; padding: 8px; cursor: pointer; margin-top: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-hist {
    display: flex; align-items: center; gap: 5px;
    background: var(--card); border: 1px solid #1e1e1e; border-radius: 8px;
    color: #555; padding: 8px 12px; font-size: 12px;
  }
  .btn-import {
    display: flex; align-items: center; gap: 5px;
    background: #4ECDC418; border: 1px solid #4ECDC440; border-radius: 8px;
    color: var(--pull); padding: 8px 12px; font-size: 12px; font-weight: 600;
  }
  .tab {
    padding: 7px 14px; border-radius: 20px; border: 1px solid #1e1e1e;
    background: transparent; color: #555; font-size: 13px; font-weight: 600;
    transition: all 0.12s;
  }
  .btn-save {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, #4ECDC4, #26a69a);
    border: none; border-radius: 14px; color: #000;
    padding: 15px; font-size: 16px; font-weight: 800; width: 100%;
    transition: opacity 0.2s;
  }
  .btn-save:disabled { opacity: 0.35; }
  .btn-add-set {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    width: 100%; background: transparent; border: none;
    color: #2e2e2e; padding: 12px 0 2px; font-size: 13px;
  }
  .btn-add-ex {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: transparent; border: 1px dashed #1e1e1e; border-radius: 12px;
    color: #333; padding: 14px; font-size: 13px; width: 100%;
  }
  .btn-trash { background: transparent; border: none; color: #aaa; padding: 4px; display: flex; align-items: center; }

  /* ── Cards ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .ex-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 14px; cursor: pointer;
  }
  .ex-name { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 3px; }
  .ex-meta { color: #3e3e3e; font-size: 12px; }
  .ex-next { text-align: right; margin-right: 6px; }
  .ex-next-num { font-weight: 800; font-size: 17px; font-family: monospace; }
  .ex-next-label { color: #383838; font-size: 10px; }
  .ex-arrow { font-size: 22px; opacity: 0.35; }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    font-family: monospace; margin-bottom: 4px;
  }

  /* ── Rec banner ── */
  .rec-banner { background: var(--card); border: 1px solid; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .rec-label { color: #484848; font-size: 11px; margin-bottom: 4px; }
  .rec-weight { font-size: 36px; font-weight: 900; color: #fff; line-height: 1; font-family: monospace; }
  .rec-unit { font-size: 17px; color: #444; font-weight: 400; }
  .rec-last { color: #484848; font-size: 12px; margin-top: 3px; }
  .status-pill { padding: 6px 11px; border-radius: 100px; font-size: 12px; font-weight: 700; }

  /* ── Set grid ── */
  .grid-header { display: flex; align-items: center; gap: 8px; padding-bottom: 8px; margin-bottom: 4px; border-bottom: 1px solid var(--border); }
  .col-label { flex: 1; color: #333; font-size: 10px; letter-spacing: 0.06em; text-align: center; font-family: monospace; }
  .set-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid; border-radius: 4px; transition: all 0.15s; }
  .set-icon { width: 30px; text-align: center; font-size: 15px; }
  .cell-input {
    flex: 1; background: #161616; border: 1px solid #1a1a1a; border-radius: 8px;
    color: #fff; padding: 10px 4px; font-size: 16px; outline: none;
    text-align: center; font-family: monospace; font-weight: 600; min-width: 0;
    -webkit-appearance: none;
  }

  /* ── Projection card ── */
  .proj-card { background: #0d0d0d; border: 1px solid; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .proj-label { color: #2e2e2e; font-size: 10px; letter-spacing: 0.12em; font-family: monospace; margin-bottom: 8px; }
  .proj-weight { font-size: 30px; font-weight: 900; font-family: monospace; line-height: 1; }
  .proj-note { color: #4a4a4a; font-size: 12px; margin-top: 4px; }

  /* ── RPE ── */
  .rpe-row { display: flex; gap: 7px; margin-bottom: 6px; }
  .rpe-btn {
    flex: 1; background: #161616; border: 1px solid #222; border-radius: 8px;
    color: #484848; padding: 10px 0; font-size: 15px;
    font-weight: 700; font-family: monospace; transition: all 0.1s;
  }
  .rpe-labels { display: flex; justify-content: space-between; color: #333; font-size: 10px; }

  /* ── History ── */
  .date-header { color: #383838; font-size: 11px; font-family: monospace; letter-spacing: 0.08em; margin-bottom: 8px; text-transform: uppercase; }
  .hist-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .mini-set { background: #141414; border: 1px solid; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-family: monospace; }
  .mini-sets-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

  /* ── Custom exercise ── */
  .custom-card { display: flex; gap: 8px; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 12px; }
  .custom-input { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; font-family: 'DM Sans', sans-serif; }
  .btn-custom-add { background: var(--pull); border: none; border-radius: 6px; color: #000; padding: 6px 12px; font-weight: 700; font-size: 13px; }
  .btn-custom-cancel { background: transparent; border: none; color: #444; font-size: 16px; }

  /* ── Import ── */
  .upload-area {
    border: 2px dashed #2a2a2a; border-radius: 16px; padding: 40px 20px;
    text-align: center; cursor: pointer; margin-bottom: 14px;
    background: var(--card);
  }
  .upload-emoji { font-size: 36px; margin-bottom: 10px; }
  .upload-title { color: #fff; font-weight: 700; margin-bottom: 4px; }
  .upload-sub { color: #484848; font-size: 12px; }
  .import-img { width: 100%; border-radius: 12px; border: 1px solid #1e1e1e; max-height: 280px; object-fit: cover; object-position: top; display: block; margin-bottom: 8px; }
  .import-desc { color: #484848; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .error-box { background: #FF6B6B18; border: 1px solid #FF6B6B40; border-radius: 12px; padding: 12px 14px; color: #FF6B6B; font-size: 13px; margin-bottom: 12px; }
  .import-ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .import-ex-name { color: #fff; font-weight: 700; font-size: 15px; }
  .import-ex-sets { color: #484848; font-size: 12px; margin-top: 2px; }
  .import-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #2a2a2a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .found-header { color: #484848; font-size: 11px; letter-spacing: 0.07em; font-family: monospace; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: #000; font-weight: 700; padding: 11px 22px; border-radius: 100px;
    font-size: 13px; z-index: 9999; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    pointer-events: none; transition: opacity 0.3s;
  }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 30px; height: 30px; border: 3px solid #1a1a1a; border-top-color: var(--pull); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .btn-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #00000040; border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }

  .empty-state { text-align: center; color: #2e2e2e; padding: 60px 0; font-size: 14px; }
  .spacer { height: 48px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-center { display: flex; align-items: center; }
  .gap-8 { gap: 8px; }
  .mt-4 { margin-top: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-20 { margin-bottom: 20px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'overload-workout-data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { exercises: {}, sessions: [] };
  } catch { return { exercises: {}, sessions: [] }; }
}

function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
}

// ── Progressive overload ──────────────────────────────────────────────────────
function getRecommendation(history) {
  if (!history || !history.length) return null;
  const last = history[0];
  const { sets, rpe } = last;
  if (!sets || !sets.length) return null;

  const targetReps = sets[0].targetReps || 8;
  const totalSets  = sets.length;
  const setsMissed = sets.filter(s => s.reps < targetReps).length;
  const allHit     = setsMissed === 0;
  const oneMissed  = setsMissed === 1;
  const manyMissed = setsMissed >= Math.ceil(totalSets / 2);
  const lastWeight = sets[0].weight;
  const isUpper    = last.muscleGroup === 'push' || last.muscleGroup === 'pull';
  const increment  = isUpper ? 5 : 10;

  let nextWeight = lastWeight, note = '', status = 'hold';

  if (allHit && rpe && rpe <= 6)        { nextWeight = lastWeight + increment * 1.5; note = 'All sets felt easy — bigger jump!'; status = 'up'; }
  else if (allHit)                       { nextWeight = lastWeight + increment; note = `All ${totalSets} sets complete — move up!`; status = 'up'; }
  else if (oneMissed && !manyMissed)    { nextWeight = lastWeight; note = 'Almost there — hold weight and nail all sets.'; status = 'hold'; }
  else if (manyMissed || (rpe && rpe >= 10)) { nextWeight = Math.round((lastWeight * 0.9) / 2.5) * 2.5; note = 'Struggled on multiple sets — slight deload.'; status = 'down'; }
  else                                   { nextWeight = lastWeight; note = 'Hold weight and focus on form.'; status = 'hold'; }

  return { nextWeight, note, lastWeight, lastSets: sets, rpe, status };
}

// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_EXERCISES = {
  push:     ['Bench Press','Overhead Press','Incline DB Press','Lateral Raises','Tricep Pushdown'],
  pull:     ['Deadlift','Barbell Row','Pull-Ups','Cable Row','Face Pulls','Bicep Curl'],
  legs:     ['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raise'],
  freeform: []
};

const GC = {
  push:     { bg:'#FF6B35', light:'#FF6B3518', text:'#FF6B35' },
  pull:     { bg:'#4ECDC4', light:'#4ECDC418', text:'#4ECDC4' },
  legs:     { bg:'#A78BFA', light:'#A78BFA18', text:'#A78BFA' },
  freeform: { bg:'#F59E0B', light:'#F59E0B18', text:'#F59E0B' }
};

const SM = {
  up:   { color:'#4ECDC4', icon:'↑', label:'Increase' },
  hold: { color:'#F59E0B', icon:'→', label:'Hold'     },
  down: { color:'#FF6B6B', icon:'↓', label:'Deload'   }
};

function detectGroup(name) {
  const n = name.toLowerCase();
  if (/bench|press|fly|flye|dip|tricep|lateral|chest|push|pec|shoulder|delt/.test(n)) return 'push';
  if (/row|pull|curl|deadlift|lat|bicep|back|chin|cable|face/.test(n)) return 'pull';
  if (/squat|leg|lunge|calf|hamstring|glute|hip|rdl|romanian/.test(n)) return 'legs';
  return 'freeform';
}

// ── SVG Icons ─────────────────────────────────────────────────────────────────
const SVG = {
  back:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  plus:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  trash:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>`,
  check:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  clock:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  image:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`
};

// ── App State ─────────────────────────────────────────────────────────────────
let state = {
  data: loadData(),
  view: 'home',          // home | log | history | import
  activeGroup: 'push',
  activeExercise: null,
  sets: [{w:'',r:'',t:'8'},{w:'',r:'',t:'8'},{w:'',r:'',t:'8'}],
  sessionRPE: null,
  showCustomInput: false,
  customExercise: '',
  // import
  importImage: null,
  importLoading: false,
  importResults: null,
  importError: null,
  importSelected: [],
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function persist(newData) {
  state.data = newData;
  saveData(newData);
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getHistory(name) {
  return (state.data.sessions || [])
    .filter(s => s.exercise === name)
    .sort((a,b) => new Date(b.date) - new Date(a.date));
}

function getExercisesForGroup(group) {
  const defaults = DEFAULT_EXERCISES[group] || [];
  const custom   = Object.values(state.data.exercises || {}).filter(e => e.group === group).map(e => e.name);
  return [...defaults, ...custom];
}

function blankSets(w='', t='8') {
  return [{w,r:'',t},{w,r:'',t},{w,r:'',t}];
}

function getLiveProjection() {
  const filled = state.sets.filter(s => s.w !== '' && s.r !== '');
  if (!filled.length) return null;
  const fakeSets = filled.map(s => ({ weight: parseFloat(s.w)||0, reps: parseInt(s.r)||0, targetReps: parseInt(s.t)||8 }));
  return getRecommendation([{ sets: fakeSets, rpe: state.sessionRPE, muscleGroup: state.activeExercise?.group }]);
}

function showToast(msg, color='#4ECDC4') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = color;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function startLog(name, group) {
  const hist = getHistory(name);
  const rec  = getRecommendation(hist);
  const t    = String(hist[0]?.sets[0]?.targetReps || 8);
  const w    = rec ? String(rec.nextWeight) : '';
  setState({ view:'log', activeExercise:{name,group}, sets: blankSets(w,t), sessionRPE: null });
}

function updateSetField(i, field, val) {
  const sets = state.sets.map((s,idx) => idx===i ? {...s,[field]:val} : s);
  if (field==='w' && i===0) {
    for (let j=1;j<sets.length;j++) {
      if (sets[j].w==='' || sets[j].w===state.sets[0].w) sets[j] = {...sets[j], w:val};
    }
  }
  setState({sets});
}

function addExtraSet() {
  const s0 = state.sets[0];
  setState({ sets: [...state.sets, {w:s0?.w||'', r:'', t:s0?.t||'8'}] });
}

function removeSet(i) {
  if (state.sets.length <= 1) return;
  setState({ sets: state.sets.filter((_,idx)=>idx!==i) });
}

function finishSession() {
  const filled = state.sets.filter(s=>s.w!==''&&s.r!=='');
  if (!filled.length) return;
  const finalSets = filled.map(s=>({ weight:parseFloat(s.w), reps:parseInt(s.r), targetReps:parseInt(s.t)||8 }));
  const session = { id:Date.now(), exercise:state.activeExercise.name, muscleGroup:state.activeExercise.group, date:new Date().toISOString(), sets:finalSets, rpe:state.sessionRPE };
  persist({ ...state.data, sessions:[...(state.data.sessions||[]),session] });
  showToast(`✓ ${state.activeExercise.name} saved!`);
  setState({ view:'home' });
}

function deleteSession(id) {
  persist({ ...state.data, sessions:(state.data.sessions||[]).filter(s=>s.id!==id) });
}

function addCustomExercise() {
  const name = state.customExercise.trim();
  if (!name) return;
  const key = `custom-${Date.now()}`;
  persist({ ...state.data, exercises:{...(state.data.exercises||{}), [key]:{name,group:state.activeGroup,key}} });
  showToast(`Added "${name}"!`);
  setState({ customExercise:'', showCustomInput:false });
}

// ── Screenshot import ─────────────────────────────────────────────────────────
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => setState({ importImage: ev.target.result, importResults:null, importError:null });
  reader.readAsDataURL(file);
}

async function parseScreenshot() {
  if (!state.importImage) return;
  setState({ importLoading:true, importError:null, importResults:null });

  try {
    const base64    = state.importImage.split(',')[1];
    const mediaType = state.importImage.split(';')[0].split(':')[1];

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type:'image', source:{ type:'base64', media_type:mediaType, data:base64 } },
            { type:'text', text:`This is a workout tracking app screenshot. Extract all exercises and sets.
Return ONLY valid JSON, no markdown, no explanation:
{"date":"YYYY-MM-DD or null","exercises":[{"name":"Exercise Name","sets":[{"reps":8,"weight":135}]}]}
Weight in lbs as number. Bodyweight = 0. Parse every exercise visible.` }
          ]
        }]
      })
    });

    const d    = await response.json();
    const text = (d.content||[]).map(c=>c.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    setState({ importLoading:false, importResults:parsed, importSelected:parsed.exercises.map((_,i)=>i) });
  } catch(err) {
    setState({ importLoading:false, importError:'Couldn\'t parse the screenshot. Make sure it clearly shows exercises and sets.' });
  }
}

function toggleImportSelect(i) {
  const sel = state.importSelected;
  const next = sel.includes(i) ? sel.filter(x=>x!==i) : [...sel,i];
  setState({ importSelected: next });
}

function confirmImport() {
  const { importResults, importSelected } = state;
  if (!importResults) return;
  const dateStr = (importResults.date || new Date().toISOString().split('T')[0]) + 'T12:00:00.000Z';
  const newSessions = importResults.exercises
    .filter((_,i) => importSelected.includes(i))
    .map(ex => ({
      id: Date.now() + Math.random(),
      exercise: ex.name,
      muscleGroup: detectGroup(ex.name),
      date: dateStr,
      sets: ex.sets.map(s=>({ weight:s.weight, reps:s.reps, targetReps:s.reps })),
      rpe: null
    }));
  persist({ ...state.data, sessions:[...(state.data.sessions||[]),...newSessions] });
  showToast(`✓ Imported ${newSessions.length} exercise${newSessions.length!==1?'s':''}!`);
  setState({ view:'home', importImage:null, importResults:null, importError:null, importSelected:[] });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const v = state.view;
  if      (v==='log')     app.innerHTML = renderLog();
  else if (v==='history') app.innerHTML = renderHistory();
  else if (v==='import')  app.innerHTML = renderImport();
  else                    app.innerHTML = renderHome();
  attachEvents();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const groups   = ['push','pull','legs','freeform'];
  const exercises = getExercisesForGroup(state.activeGroup);
  const total    = (state.data.sessions||[]).length;
  const week     = (state.data.sessions||[]).filter(s=>(new Date()-new Date(s.date))/86400000<=7).length;
  const col      = GC[state.activeGroup];

  const tabsHtml = groups.map(g => {
    const c = GC[g];
    const active = state.activeGroup===g;
    const style = active
      ? `background:${c.bg};color:#000;border-color:${c.bg};font-weight:800;`
      : 'border-color:#1e1e1e;color:#555;';
    return `<button class="tab" style="${style}" data-action="set-group" data-group="${g}">${g.charAt(0).toUpperCase()+g.slice(1)}</button>`;
  }).join('');

  const exHtml = exercises.map(name => {
    const hist = getHistory(name);
    const last = hist[0]||null;
    const rec  = getRecommendation(hist);
    const lastTxt = last
      ? `Last: ${last.sets[0]?.weight} lbs · ${last.sets.map(s=>s.reps).join(' / ')} reps <span style="color:#333;margin-left:6px">${new Date(last.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>`
      : `<span style="color:#2e2e2e">No history yet</span>`;
    const recHtml = rec
      ? `<div class="ex-next"><div class="ex-next-num" style="color:${col.text}">${rec.nextWeight}</div><div class="ex-next-label">lbs next</div></div>`
      : '';
    return `<div class="ex-card" data-action="start-log" data-name="${escHtml(name)}" data-group="${state.activeGroup}">
      <div style="flex:1;min-width:0">
        <div class="ex-name">${escHtml(name)}</div>
        <div class="ex-meta">${lastTxt}</div>
      </div>
      ${recHtml}
      <div class="ex-arrow" style="color:${col.text}">›</div>
    </div>`;
  }).join('');

  const customHtml = state.showCustomInput
    ? `<div class="custom-card">
        <input class="custom-input" id="custom-ex-input" placeholder="New ${state.activeGroup} exercise..." value="${escHtml(state.customExercise)}"/>
        <button class="btn-custom-add" data-action="add-custom">Add</button>
        <button class="btn-custom-cancel" data-action="cancel-custom">✕</button>
      </div>`
    : `<button class="btn-add-ex" data-action="show-custom">${SVG.plus} <span style="margin-left:5px">Add Exercise</span></button>`;

  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div><div class="app-name">OVERLOAD</div><div class="app-sub">Progressive Strength Tracker</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn-import" data-action="go-import">${SVG.image} Import</button>
        <button class="btn-hist" data-action="go-history">${SVG.clock} History</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Sessions</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#FF6B35">${week}</div><div class="stat-label">This Week</div></div>
    </div>
    <div class="tab-row">${tabsHtml}</div>
    <div class="exercise-list">${exHtml}${customHtml}</div>`;
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function renderLog() {
  const { activeExercise, sets, sessionRPE } = state;
  const hist    = getHistory(activeExercise.name);
  const lastRec = getRecommendation(hist);
  const liveProj= getLiveProjection();
  const col     = GC[activeExercise.group]||GC.freeform;
  const canSave = sets.some(s=>s.w!==''&&s.r!=='');

  const recHtml = lastRec ? `
    <div class="rec-banner" style="border-color:${col.bg}55">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="rec-label">🎯 Recommended for today</div>
          <div class="rec-weight">${lastRec.nextWeight}<span class="rec-unit"> lbs</span></div>
          <div class="rec-last">Last: ${lastRec.lastWeight} lbs — ${lastRec.lastSets.map(s=>s.reps).join(' / ')} reps</div>
        </div>
        <div class="status-pill" style="background:${SM[lastRec.status].color}20;color:${SM[lastRec.status].color}">
          ${SM[lastRec.status].icon} ${SM[lastRec.status].label}
        </div>
      </div>
    </div>` : '';

  const setsHtml = sets.map((s,i) => {
    const filled = s.w!==''&&s.r!=='';
    const hit    = filled && parseInt(s.r)>=parseInt(s.t||8);
    const borderColor = filled ? (hit?'#4ECDC425':'#FF6B6B25') : '#1a1a1a';
    const bg    = filled ? (hit?'#4ECDC408':'#FF6B6B08') : 'transparent';
    const icon  = filled
      ? `<span style="color:${hit?'#4ECDC4':'#FF6B6B'};font-size:15px">${hit?'✓':'✗'}</span>`
      : `<span style="color:#2e2e2e;font-family:monospace;font-size:11px">S${i+1}</span>`;
    const repsBorder = filled?(hit?'#4ECDC450':'#FF6B6B50'):'#1a1a1a';
    const repsColor  = filled?(hit?'#4ECDC4':'#FF6B6B'):'#fff';
    const repsWeight = filled?800:600;
    return `<div class="set-row" style="border-bottom-color:${borderColor};background:${bg}">
      <div class="set-icon">${icon}</div>
      <input class="cell-input" type="number" inputmode="decimal" placeholder="${lastRec?lastRec.nextWeight:'lbs'}" value="${s.w}" data-action="set-field" data-idx="${i}" data-field="w" style="border-color:${s.w?'#2e2e2e':'#1a1a1a'}"/>
      <input class="cell-input" type="number" inputmode="numeric" placeholder="—" value="${s.r}" data-action="set-field" data-idx="${i}" data-field="r" style="border-color:${repsBorder};color:${repsColor};font-weight:${repsWeight}"/>
      <input class="cell-input" type="number" inputmode="numeric" placeholder="8" value="${s.t}" data-action="set-field" data-idx="${i}" data-field="t" style="border-color:#1a1a1a;color:#4a4a4a"/>
      <button class="btn-trash" data-action="remove-set" data-idx="${i}" style="opacity:${sets.length>1?0.5:0.1}">${SVG.trash}</button>
    </div>`;
  }).join('');

  const projHtml = liveProj ? `
    <div class="proj-card" style="border-color:${SM[liveProj.status].color}35">
      <div class="proj-label">NEXT SESSION PROJECTION</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="proj-weight" style="color:${SM[liveProj.status].color}">${liveProj.nextWeight}<span style="font-size:16px;color:#444;font-weight:400"> lbs</span></div>
          <div class="proj-note">${liveProj.note}</div>
        </div>
        <div style="font-size:26px">${liveProj.status==='up'?'🔥':liveProj.status==='hold'?'💪':'🔄'}</div>
      </div>
    </div>` : '';

  const rpeBtns = [6,7,8,9,10].map(r => {
    const active = sessionRPE===r;
    const style  = active ? `background:${col.bg};color:#000;border-color:${col.bg}` : '';
    return `<button class="rpe-btn" style="${style}" data-action="set-rpe" data-rpe="${r}">${r}</button>`;
  }).join('');

  return `
    <div class="header">
      <button class="btn-back" data-action="go-home">${SVG.back}</button>
      <div style="flex:1">
        <span class="badge" style="background:${col.light};color:${col.text}">${activeExercise.group.toUpperCase()}</span>
        <h2 class="screen-title">${escHtml(activeExercise.name)}</h2>
      </div>
    </div>
    ${recHtml}
    <div class="card">
      <div class="grid-header">
        <div style="width:30px"></div>
        <div class="col-label">Weight (lbs)</div>
        <div class="col-label">Reps Done</div>
        <div class="col-label">Target</div>
        <div style="width:26px"></div>
      </div>
      ${setsHtml}
      <button class="btn-add-set" data-action="add-set">${SVG.plus} <span style="margin-left:4px">Add Set</span></button>
    </div>
    ${projHtml}
    <div class="card">
      <div class="card-label">Overall RPE <span style="color:#383838;font-weight:400">(how hard was the session?)</span></div>
      <div class="rpe-row">${rpeBtns}</div>
      <div class="rpe-labels"><span>Easy</span><span>Moderate</span><span>Max</span></div>
    </div>
    <button class="btn-save" data-action="finish-session" ${canSave?'':'disabled'}>
      ${SVG.check} Save Session
    </button>
    <div class="spacer"></div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const sorted  = [...(state.data.sessions||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const grouped = {};
  sorted.forEach(s=>{
    const d = new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    if(!grouped[d]) grouped[d]=[];
    grouped[d].push(s);
  });

  const isEmpty = !Object.keys(grouped).length;
  const bodyHtml = isEmpty
    ? `<div class="empty-state">No sessions yet — start lifting!</div>`
    : Object.entries(grouped).map(([date,sessions])=>{
        const rows = sessions.map(s=>{
          const col    = GC[s.muscleGroup]||GC.freeform;
          const topSet = [...s.sets].sort((a,b)=>b.weight-a.weight)[0];
          const allHit = s.sets.every(set=>set.reps>=(set.targetReps||0));
          const miniSets = s.sets.map(set=>{
            const hit = set.reps>=(set.targetReps||0);
            return `<div class="mini-set" style="border-color:${hit?col.bg+'70':'#252525'};color:${hit?col.text:'#484848'}">${set.weight}×${set.reps}</div>`;
          }).join('');
          return `<div class="hist-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
                  <span class="badge" style="background:${col.light};color:${col.text};margin:0">${(s.muscleGroup||'').toUpperCase()}</span>
                  ${allHit?'<span style="font-size:11px;color:#4ECDC4">✓ All sets</span>':''}
                </div>
                <div style="color:#fff;font-weight:700;font-size:15px">${escHtml(s.exercise)}</div>
                <div style="color:#484848;font-size:12px;margin-top:3px">${s.sets.length} sets · Top: ${topSet?.weight} lbs × ${topSet?.reps} reps${s.rpe?` · RPE ${s.rpe}`:''}</div>
              </div>
              <button class="btn-trash" data-action="delete-session" data-id="${s.id}" style="opacity:0.5">${SVG.trash}</button>
            </div>
            <div class="mini-sets-row">${miniSets}</div>
          </div>`;
        }).join('');
        return `<div style="margin-bottom:22px"><div class="date-header">${date}</div>${rows}</div>`;
      }).join('');

  return `
    <div class="header">
      <button class="btn-back" data-action="go-home">${SVG.back}</button>
      <h2 class="screen-title">History</h2>
    </div>
    ${bodyHtml}
    <div class="spacer"></div>`;
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function renderImport() {
  const { importImage, importLoading, importResults, importError, importSelected } = state;

  const uploadHtml = !importImage
    ? `<div class="upload-area" data-action="trigger-file">
        <div class="upload-emoji">📸</div>
        <div class="upload-title">Tap to upload screenshot</div>
        <div class="upload-sub">From your Club4 app or any workout tracker</div>
      </div>`
    : `<div>
        <img class="import-img" src="${importImage}" alt="Workout screenshot"/>
        <button class="btn-add-ex" data-action="trigger-file" style="margin-bottom:8px">${SVG.image} <span style="margin-left:5px">Choose different image</span></button>
      </div>`;

  const parseBtn = importImage && !importResults
    ? `<button class="btn-save" data-action="parse-screenshot" ${importLoading?'disabled':''} style="margin-bottom:12px;opacity:${importLoading?0.6:1}">
        ${importLoading?`<span class="btn-spinner"></span> Reading your workout...`:`${SVG.image} <span style="margin-left:6px">Read Workout</span>`}
      </button>` : '';

  const errorHtml = importError ? `<div class="error-box">${importError}</div>` : '';

  let resultsHtml = '';
  if (importResults) {
    const exCards = importResults.exercises.map((ex,i)=>{
      const sel  = importSelected.includes(i);
      const grp  = detectGroup(ex.name);
      const col  = GC[grp];
      const mini = ex.sets.map(s=>`<div class="mini-set" style="border-color:${col.bg}50;color:${col.text}">${s.weight>0?`${s.weight}×${s.reps}`:`BW×${s.reps}`}</div>`).join('');
      return `<div class="import-ex-card" data-action="toggle-import" data-idx="${i}"
          style="border-color:${sel?col.bg+'50':'#1a1a1a'};background:${sel?col.light:'#111'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
              <span class="badge" style="background:${col.light};color:${col.text};margin:0">${grp.toUpperCase()}</span>
            </div>
            <div class="import-ex-name">${escHtml(ex.name)}</div>
            <div class="import-ex-sets">${ex.sets.length} sets</div>
          </div>
          <div class="import-checkbox" style="border-color:${sel?col.bg:'#2a2a2a'};background:${sel?col.bg:'transparent'}">
            ${sel?'<span style="color:#000;font-size:13px;font-weight:900">✓</span>':''}
          </div>
        </div>
        <div class="mini-sets-row">${mini}</div>
      </div>`;
    }).join('');

    resultsHtml = `
      <div class="found-header">FOUND ${importResults.exercises.length} EXERCISES${importResults.date?` <span style="color:#383838">· ${importResults.date}</span>`:''}</div>
      ${exCards}
      <button class="btn-save" data-action="confirm-import" style="margin-top:8px;opacity:${importSelected.length>0?1:0.35}" ${importSelected.length?'':'disabled'}>
        ${SVG.check} Import ${importSelected.length} Exercise${importSelected.length!==1?'s':''}
      </button>`;
  }

  return `
    <div class="header">
      <button class="btn-back" data-action="go-home">${SVG.back}</button>
      <h2 class="screen-title">Import Workout</h2>
    </div>
    <div class="import-desc">Take a screenshot of your Club4 workout and upload it. Claude will read the exercises and weights automatically.</div>
    ${uploadHtml}
    ${parseBtn}
    ${errorHtml}
    ${resultsHtml}
    <input type="file" id="file-input" accept="image/*" style="display:none"/>
    <div class="spacer"></div>`;
}

// ── Event delegation ──────────────────────────────────────────────────────────
function attachEvents() {
  const app = document.getElementById('app');

  // Input changes (live, not on click)
  app.querySelectorAll('[data-action="set-field"]').forEach(el => {
    el.addEventListener('input', e => {
      updateSetField(+e.target.dataset.idx, e.target.dataset.field, e.target.value);
    });
  });

  app.querySelectorAll('[data-action="set-field"]').forEach(el => {
    // Prevent render stealing focus mid-type by not re-rendering on every keystroke for non-mirrored fields
  });

  const customIn = document.getElementById('custom-ex-input');
  if (customIn) {
    customIn.addEventListener('input', e => setState({ customExercise: e.target.value }));
    customIn.addEventListener('keydown', e => { if(e.key==='Enter') addCustomExercise(); });
  }

  const fileIn = document.getElementById('file-input');
  if (fileIn) fileIn.addEventListener('change', handleFileSelect);

  app.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const a = el.dataset.action;

    if (a==='go-home')        setState({ view:'home' });
    else if (a==='go-history') setState({ view:'history' });
    else if (a==='go-import')  setState({ view:'import' });
    else if (a==='set-group')  setState({ activeGroup: el.dataset.group, showCustomInput:false });
    else if (a==='start-log')  startLog(el.dataset.name, el.dataset.group);
    else if (a==='show-custom') setState({ showCustomInput:true });
    else if (a==='cancel-custom') setState({ showCustomInput:false, customExercise:'' });
    else if (a==='add-custom') addCustomExercise();
    else if (a==='add-set')   addExtraSet();
    else if (a==='remove-set') removeSet(+el.dataset.idx);
    else if (a==='finish-session') finishSession();
    else if (a==='delete-session') deleteSession(+el.dataset.id);
    else if (a==='set-rpe') {
      const r = +el.dataset.rpe;
      setState({ sessionRPE: state.sessionRPE===r ? null : r });
    }
    else if (a==='trigger-file') document.getElementById('file-input')?.click();
    else if (a==='parse-screenshot') parseScreenshot();
    else if (a==='toggle-import') toggleImportSelect(+el.dataset.idx);
    else if (a==='confirm-import') confirmImport();
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
